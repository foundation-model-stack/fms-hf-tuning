controller-metrics:
  - name: eval_loss_window
    class: HistoryBasedMetric
    arguments:
      window-size: 2
controllers:
  - name: epoch-level-eval-loss-patience
    triggers:
      - on_epoch_end
    rule:
      rule_str: len(eval_loss_window["metrics"]) > 0 and eval_loss_window["metrics"][-1]["eval_loss"] > 2
      patience:
        patience-threshold: 2
    operations:
      - hfcontrols.should_training_stop